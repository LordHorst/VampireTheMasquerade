<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTM Charaktereditor - Revised Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap');
        
        body { 
            font-family: 'Crimson Pro', serif; 
            background: radial-gradient(circle at center, #0a2f1f 0%, #051a11 50%, #020806 100%);
            background-attachment: fixed;
        }

        .revised-card {
            background-color: rgba(5, 20, 15, 0.95);
            border: 2px solid #1a4d36;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(0, 50, 30, 0.2);
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .header-font {
            font-family: 'UnifrakturMaguntia', serif;
        }

        .dot-filled {
            background: radial-gradient(circle at 30% 30%, #34d399, #065f46);
            box-shadow: 0 0 5px rgba(52, 211, 153, 0.4);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(100, 116, 139, 0.5);
        }

        .health-box, .text-box {
            border: 1px solid #1a4d36;
            background: rgba(0,0,0,0.3);
        }

        textarea {
            resize: none;
            scrollbar-width: thin;
            scrollbar-color: #1a4d36 transparent;
        }

        select {
            background-color: #051a11;
            color: #d1d5db;
            border-bottom: 1px solid rgba(6, 95, 70, 0.3);
            cursor: pointer;
        }
        
        select optgroup {
            background-color: #020806;
            color: #10b981;
            font-style: normal;
            font-weight: bold;
        }

        select option {
            background-color: #051a11;
            color: #d1d5db;
            font-weight: normal;
        }
    </style>
</head>
<body class="text-stone-300 min-h-screen py-8 px-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const DotRating = ({ value, max = 5, onChange, min = 0 }) => {
            return (
                <div className="flex space-x-1.5 items-center">
                    {[...Array(max)].map((_, i) => (
                        <div
                            key={i}
                            onClick={() => {
                                const newValue = i + 1;
                                onChange(newValue === value ? Math.max(min, value - 1) : newValue);
                            }}
                            className={`w-3.5 h-3.5 rounded-full border border-emerald-900 cursor-pointer transition-all duration-300
                                ${i < value ? 'dot-filled scale-110' : 'bg-black/40 hover:bg-emerald-900/40'}`}
                        />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [character, setCharacter] = useState({
                info: {
                    Name: "", Spieler: "", Chronik: "",
                    Wesen: "", Verhalten: "", Clan: "",
                    Generation: "", Zuflucht: "", Konzept: ""
                },
                attributes: {
                    körperlich: { Körperkraft: 1, Geschick: 1, Widerstandsfähigkeit: 1 },
                    gesellschaftlich: { Charisma: 1, Manipulation: 1, Erscheinungsbild: 1 },
                    geistig: { Wahrnehmung: 1, Intelligenz: 1, Geistesschärfe: 1 }
                },
                abilities: {
                    talente: {
                        Ausdruck: 0, Aufmerksamkeit: 0, Ausflüchte: 0, Ausweichen: 0,
                        Einschüchtern: 0, Empathie: 0, Führungsqualitäten: 0, Handgemenge: 0,
                        Sportlichkeit: 0, Szenekenntnis: 0
                    },
                    fertigkeiten: {
                        Etikette: 0, Fahren: 0, Handwerk: 0, Heimlichkeit: 0, Nahkampf: 0,
                        Schusswaffen: 0, Sicherheit: 0, Tierkunde: 0, Überleben: 0, Vortrag: 0
                    },
                    kenntnisse: {
                        Akademisches_Wissen: 0, Computer: 0, Finanzen: 0, Gesetzeskenntnis: 0,
                        Linguistik: 0, Medizin: 0, Nachforschungen: 0, Naturwissenschaften: 0,
                        Okkultismus: 0, Politik: 0
                    }
                },
                advantages: {
                    disziplinen: [{ name: "", value: 0 }, { name: "", value: 0 }, { name: "", value: 0 }],
                    hintergründe: [{ name: "", value: 0 }, { name: "", value: 0 }, { name: "", value: 0 }],
                    tugenden: { Gewissen: 1, Selbstbeherrschung: 1, Mut: 1 }
                },
                status: {
                    menschlichkeit: 7,
                    willenskraft: { gesamt: 5, aktuell: 5 },
                    blutvorrat: 10,
                    gesundheit: [
                        { label: "Blaue Flecken", penalty: 0, checked: false },
                        { label: "Verletzt", penalty: -1, checked: false },
                        { label: "Schwer Verletzt", penalty: -1, checked: false },
                        { label: "Verwundet", penalty: -2, checked: false },
                        { label: "Schwer Verwundet", penalty: -2, checked: false },
                        { label: "Verkrüppelt", penalty: -5, checked: false },
                        { label: "Außer Gefecht", penalty: "X", checked: false },
                    ]
                },
                extra: {
                    vorzügeSchwächen: "",
                    erfahrung: ""
                }
            });

            const updateInfo = (f, v) => setCharacter(p => ({ ...p, info: { ...p.info, [f]: v } }));
            
            const updateStat = (cat, sub, f, v) => setCharacter(p => ({
                ...p, [cat]: { ...p[cat], [sub]: { ...p[cat][sub], [f]: v } }
            }));

            const updateHealth = (i) => {
                const nh = [...character.status.gesundheit];
                nh[i].checked = !nh[i].checked;
                setCharacter(p => ({ ...p, status: { ...p.status, gesundheit: nh } }));
            };

            const updateExtra = (f, v) => setCharacter(p => ({ ...p, extra: { ...p.extra, [f]: v } }));

            return (
                <div className="max-w-5xl mx-auto revised-card p-8 md:p-12 mb-12">
                    <header className="text-center mb-12 border-b border-emerald-900/50 pb-6">
                        <h1 className="text-6xl font-bold tracking-[0.2em] text-emerald-500 uppercase mb-2 drop-shadow-lg header-font">Vampire</h1>
                        <p className="text-sm tracking-[0.5em] text-emerald-700 font-bold uppercase">Die Maskerade</p>
                    </header>

                    {/* Info Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-4 mb-12">
                        {Object.entries(character.info).map(([key, val]) => (
                            <div key={key} className="flex flex-col border-b border-emerald-900/30">
                                <label className="text-[10px] uppercase text-emerald-600 font-bold tracking-widest">{key}</label>
                                {key === "Clan" ? (
                                    <select 
                                        value={val} 
                                        onChange={(e) => updateInfo(key, e.target.value)}
                                        className="bg-transparent outline-none py-1 text-stone-100"
                                    >
                                        <option value="" disabled>Wähle einen Clan...</option>
                                        <optgroup label="Camarilla">
                                            <option value="Brujah">Brujah</option>
                                            <option value="Gangrel">Gangrel</option>
                                            <option value="Malkavian">Malkavian</option>
                                            <option value="Nosferatu">Nosferatu</option>
                                            <option value="Toreador">Toreador</option>
                                            <option value="Tremere">Tremere</option>
                                            <option value="Ventrue">Ventrue</option>
                                        </optgroup>
                                        <optgroup label="Sabbat">
                                            <option value="Lasombra">Lasombra</option>
                                            <option value="Tzimisce">Tzimisce</option>
                                        </optgroup>
                                        <optgroup label="Unabhängige">
                                            <option value="Assamite">Assamite</option>
                                            <option value="Followers of Set">Followers of Set</option>
                                            <option value="Giovanni">Giovanni</option>
                                            <option value="Ravnos">Ravnos</option>
                                        </optgroup>
                                    </select>
                                ) : (
                                    <input
                                        type="text"
                                        value={val}
                                        onChange={(e) => updateInfo(key, e.target.value)}
                                        className="bg-transparent outline-none py-1 text-stone-100 placeholder-stone-700"
                                        placeholder="____________________"
                                    />
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="space-y-16">
                        {/* Attribute */}
                        <section>
                            <h2 className="text-xl font-bold border-y border-emerald-900/50 py-1 mb-6 text-center uppercase tracking-[0.3em] text-emerald-500">Attribute</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {Object.entries(character.attributes).map(([cat, fields]) => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[11px] font-bold text-emerald-800 uppercase mb-3 text-center tracking-tighter italic border-b border-emerald-900/20">{cat}</h3>
                                        {Object.entries(fields).map(([name, val]) => (
                                            <div key={name} className="flex justify-between items-center group">
                                                <span className="text-sm group-hover:text-emerald-400 transition-colors">{name}</span>
                                                <DotRating value={val} min={1} onChange={(v) => updateStat('attributes', cat, name, v)} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Fähigkeiten */}
                        <section>
                            <h2 className="text-xl font-bold border-y border-emerald-900/50 py-1 mb-6 text-center uppercase tracking-[0.3em] text-emerald-500">Fähigkeiten</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {Object.entries(character.abilities).map(([cat, fields]) => (
                                    <div key={cat} className="space-y-1">
                                        <h3 className="text-[11px] font-bold text-emerald-800 uppercase mb-3 text-center italic border-b border-emerald-900/20">{cat}</h3>
                                        {Object.entries(fields).map(([name, val]) => (
                                            <div key={name} className="flex justify-between items-center group">
                                                <span className="text-xs group-hover:text-emerald-400 transition-colors">{name.replace('_', ' ')}</span>
                                                <DotRating value={val} onChange={(v) => updateStat('abilities', cat, name, v)} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Vorteile & Tugenden */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 pt-4">
                            <section className="md:col-span-2">
                                <h2 className="text-xl font-bold border-b border-emerald-800 mb-6 uppercase tracking-widest text-emerald-500">Vorteile</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                    <div>
                                        <h3 className="text-[11px] font-bold text-emerald-800 uppercase mb-4 border-b border-emerald-900/20">Disziplinen</h3>
                                        {character.advantages.disziplinen.map((d, i) => (
                                            <div key={i} className="flex justify-between items-center mb-3">
                                                <input className="bg-transparent border-b border-emerald-900/30 text-sm outline-none w-2/3 focus:border-emerald-500" placeholder="________________" />
                                                <DotRating value={d.value} onChange={(v) => {
                                                    const nl = [...character.advantages.disziplinen]; nl[i].value = v;
                                                    setCharacter(p => ({ ...p, advantages: { ...p.advantages, disziplinen: nl } }));
                                                }} />
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <h3 className="text-[11px] font-bold text-emerald-800 uppercase mb-4 border-b border-emerald-900/20">Hintergründe</h3>
                                        {character.advantages.hintergründe.map((h, i) => (
                                            <div key={i} className="flex justify-between items-center mb-3">
                                                <input className="bg-transparent border-b border-emerald-900/30 text-sm outline-none w-2/3 focus:border-emerald-500" placeholder="________________" />
                                                <DotRating value={h.value} onChange={(v) => {
                                                    const nl = [...character.advantages.hintergründe]; nl[i].value = v;
                                                    setCharacter(p => ({ ...p, advantages: { ...p.advantages, hintergründe: nl } }));
                                                }} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>
                            <section>
                                <h2 className="text-xl font-bold border-b border-emerald-800 mb-6 uppercase tracking-widest text-emerald-500">Tugenden</h2>
                                {Object.entries(character.advantages.tugenden).map(([name, val]) => (
                                    <div key={name} className="flex justify-between items-center mb-6 text-sm">
                                        <span className="font-bold text-stone-400">{name}</span>
                                        <DotRating value={val} min={1} onChange={(v) => updateStat('advantages', 'tugenden', name, v)} />
                                    </div>
                                ))}
                            </section>
                        </div>

                        {/* Status Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-16 pt-12 border-t border-emerald-900/50">
                            <div className="space-y-10">
                                <div>
                                    <h3 className="text-[10px] font-bold text-emerald-700 uppercase mb-3 tracking-widest border-b border-emerald-900/20 text-center">Menschlichkeit / Pfad</h3>
                                    <div className="flex justify-center py-2">
                                        <DotRating value={character.status.menschlichkeit} max={10} onChange={(v) => setCharacter(p => ({ ...p, status: { ...p.status, menschlichkeit: v } }))} />
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-[10px] font-bold text-emerald-700 uppercase mb-3 tracking-widest border-b border-emerald-900/20 flex justify-between">
                                        <span>Willenskraft</span>
                                        <span className="text-emerald-500">{character.status.willenskraft.aktuell}/{character.status.willenskraft.gesamt}</span>
                                    </h3>
                                    <div className="flex flex-col items-center space-y-4">
                                        <DotRating value={character.status.willenskraft.gesamt} max={10} onChange={(v) => setCharacter(p => ({ ...p, status: { ...p.status, willenskraft: { ...p.status.willenskraft, gesamt: v } } }))} />
                                        <div className="flex space-x-1.5">
                                            {[...Array(10)].map((_, i) => (
                                                <div key={i} onClick={() => setCharacter(p => ({ ...p, status: { ...p.status, willenskraft: { ...p.status.willenskraft, aktuell: i < p.status.willenskraft.gesamt ? i + 1 : p.status.willenskraft.aktuell } } }))}
                                                    className={`w-6 h-6 border-2 border-emerald-900 flex items-center justify-center cursor-pointer transition-all
                                                    ${i < character.status.willenskraft.aktuell ? 'bg-emerald-600 text-black font-bold' : 'bg-black/40 text-emerald-900/20'}`}>
                                                    {i < character.status.willenskraft.gesamt && "X"}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-[10px] font-bold text-emerald-700 uppercase mb-3 tracking-widest border-b border-emerald-900/20">Blutvorrat</h3>
                                    <div className="grid grid-cols-10 gap-1.5">
                                        {[...Array(20)].map((_, i) => (
                                            <div key={i} onClick={() => setCharacter(p => ({ ...p, status: { ...p.status, blutvorrat: i + 1 } }))}
                                                className={`h-5 border border-emerald-900 rounded-sm cursor-pointer transition-all 
                                                ${i < character.status.blutvorrat ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)] scale-95' : 'bg-black/60'}`} />
                                        ))}
                                    </div>
                                </div>

                                {/* NEU: Vorzüge & Schwächen */}
                                <div className="pt-4">
                                    <h3 className="text-[11px] font-bold text-emerald-500 uppercase mb-3 tracking-widest border-b border-emerald-900/50 pb-2 italic text-center">Vorzüge / Schwächen</h3>
                                    <textarea 
                                        className="w-full h-48 p-3 text-sm text-stone-200 text-box rounded outline-none focus:border-emerald-500 transition-colors"
                                        placeholder="Deine Vorzüge und Schwächen hier eintragen..."
                                        value={character.extra.vorzügeSchwächen}
                                        onChange={(e) => updateExtra('vorzügeSchwächen', e.target.value)}
                                    ></textarea>
                                </div>
                            </div>

                            <div className="space-y-8">
                                <div className="p-6 health-box rounded-lg shadow-inner">
                                    <h3 className="text-[11px] font-bold text-emerald-500 uppercase mb-6 tracking-widest border-b border-emerald-900/50 pb-2 italic">Gesundheit</h3>
                                    <div className="space-y-2.5">
                                        {character.status.gesundheit.map((h, i) => (
                                            <div key={i} className="flex justify-between items-center text-xs group cursor-pointer" onClick={() => updateHealth(i)}>
                                                <div className="flex-1 flex justify-between pr-6 border-b border-emerald-900/10 pb-1 group-hover:text-emerald-400">
                                                    <span className="font-semibold">{h.label}</span>
                                                    <span className="text-emerald-700 italic font-bold">{h.penalty !== 0 ? h.penalty : ' '}</span>
                                                </div>
                                                <div className={`w-5 h-5 border-2 border-emerald-900 flex items-center justify-center transition-all
                                                    ${h.checked ? 'bg-emerald-700 text-black shadow-lg scale-110 rotate-3' : 'bg-black/40'}`}>
                                                    {h.checked && <span className="font-black text-sm">/</span>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* NEU: Erfahrung */}
                                <div className="p-6 health-box rounded-lg shadow-inner">
                                    <h3 className="text-[11px] font-bold text-emerald-500 uppercase mb-4 tracking-widest border-b border-emerald-900/50 pb-2 italic">Erfahrung</h3>
                                    <textarea 
                                        className="w-full h-32 p-3 text-sm text-stone-200 bg-transparent outline-none focus:text-emerald-400"
                                        placeholder="Gesamt / Ausgegeben..."
                                        value={character.extra.erfahrung}
                                        onChange={(e) => updateExtra('erfahrung', e.target.value)}
                                    ></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-20 text-[10px] text-emerald-900 text-center uppercase tracking-[0.2em] font-bold border-t border-emerald-900/20 pt-8">
                        Vampire: The Masquerade — Revised Edition Aesthetic
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
